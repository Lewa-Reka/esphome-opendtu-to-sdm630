name: Report an issue
description: Report a problem with the OpenDTU to SDM630 ESPHome component
body:
  - type: markdown
    attributes:
      value: |
        Before reporting an issue, please review the [README](https://github.com/Lewa-Reka/esphome-opendtu-to-sdm630/blob/main/README.md) - especially **Requirements**, **Configuration reference**, and **Failsafe behaviour**.

        **Scope of this repository:** the `opendtu_sdm630` ESPHome component only (WebSocket livedata → Modbus SDM630 emulator).

        **Out of scope - issues will be closed without a response** if the report does not show that the problem is in this component, for example:
        - OpenDTU setup, DTU hardware, or Hoymiles microinverter connectivity
        - Hybrid inverter wiring, RS485 port setup, or inverter menu configuration (e.g. Deye AC Couple, Grid Tie Meter 2, Eastron meter type)

        You must demonstrate a component-side fault: ESPHome logs (`opendtu_sdm630`), published sensors (WebSocket Status, Data Valid, phase values), or incorrect Modbus register output from the bridge - not only symptoms on the inverter display.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: >
        Describe the fault in this component. Show evidence from ESPHome logs, diagnostic
        sensors, or Modbus register values the bridge exposes - not only what the hybrid
        inverter or OpenDTU UI displays. Reports that only describe inverter/DTU configuration
        symptoms without component evidence will be closed.
      placeholder: |
        Example: WebSocket Data Valid is On and OpenDTU shows 800 W production, but the component L2 Power sensor stays at 0 W and logs show "Microinverter serial '...' not found in livedata"...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Optional - if you have an idea for a fix or workaround, describe it here.
      placeholder: |
        Example: I think the serial in microinverter_map does not match OpenDTU livedata...

  - type: markdown
    attributes:
      value: |
        ## Bridge environment

  - type: input
    id: component_version
    attributes:
      label: Component version
      description: >
        Value from the **Component Version** text sensor, a git tag/commit.
      placeholder: e.g. 0.0.1
    validations:
      required: true

  - type: input
    id: esphome_version
    attributes:
      label: ESPHome version
      placeholder: e.g. 2025.12.7
    validations:
      required: true

  - type: input
    id: bridge_hardware
    attributes:
      label: Bridge ESP32 hardware
      description: Board and RS485 converter used for this component (not the OpenDTU ESP32).
      placeholder: e.g. ESP32 DevKit V1, RS485-TTL auto-direction
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## OpenDTU

  - type: input
    id: opendtu_version
    attributes:
      label: OpenDTU version
      placeholder: e.g. 26.3.30
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Details

  - type: textarea
    id: config_snippet
    attributes:
      label: Relevant YAML (sanitized)
      description: >
        Paste the `opendtu_sdm630:`, `uart:`, and `modbus:` blocks from your config.
        Remove passwords and WiFi credentials - use `!secret` placeholders.
      render: yaml
      placeholder: |
        opendtu_sdm630:
          host: 192.168.1.50
          password: !secret opendtu_password
          slave_address: 0x02
          microinverter_map:
            - name: Garage-HMS-2000-4T
              grid_phase: 1

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        **Required for most reports.** Output from `esphome logs <your-config>.yaml`.

        Set `logger: level: DEBUG` temporarily if needed. Include lines tagged `opendtu_sdm630`.
      render: txt
      placeholder: |
        [00:00:00][I][opendtu_sdm630:379]: WebSocket connected to OpenDTU
        [00:00:00][W][opendtu_sdm630:258]: Microinverter serial '...' not found in livedata
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: >
        Screenshots, OpenDTU livedata excerpts, wiring notes, or anything else
        that helps reproduce the issue. Drag and drop files here if needed.
