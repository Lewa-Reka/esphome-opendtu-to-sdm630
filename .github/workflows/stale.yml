---
name: Close stale issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    name: Mark and close stale issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: stale
          exempt-issue-labels: "pinned,no-stale,help-wanted,in-progress,bug-confirmed"
          remove-stale-when-updated: true
          operations-per-run: 100
          ascending: true
          stale-issue-message: |
            This issue has been automatically marked as **stale** because it has not had any activity for the last **60 days**.

            It will be automatically **closed in 14 days** if no further information or solution proposal is provided.

            **How to prevent automatic closing?**

            - Leave a comment with up-to-date information (for example, whether the problem still occurs on the latest component version) or a solution proposal.
            - If the issue needs more time to be resolved, ask a maintainer to add the `no-stale` label - the bot will then skip this issue.
          close-issue-message: |
            Closing this issue due to inactivity for 14 days after being marked as stale. If the problem persists on the latest component version, please open a **new issue** with up-to-date information or a solution proposal.

            Thank you for your contribution to the project!
