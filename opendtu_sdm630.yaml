substitutions:
  device_name: opendtu-sdm630

external_components:
  - source: github://Lewa-Reka/esphome-opendtu-to-sdm630@main
    components: [opendtu_sdm630]

opendtu_sdm630:
  id: opendtu
  host: 192.168.1.50
  password: !secret opendtu_password
  modbus_id: modbus_1
  slave_address: 0x02
  microinverter_map:
    - name: "Garage-HMS-2000-4T"
      grid_phase: 3
    - serial: "123456789012"
      grid_phase: 2

esphome:
  name: ${device_name}
  friendly_name: OpenDTU to SDM630
  min_version: "2025.6.0"
  name_add_mac_suffix: true

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: INFO # VERBOSE / DEBUG / INFO / WARN

uart:
  id: modbus_uart
  tx_pin: 17
  rx_pin: 16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

modbus:
  id: modbus_1
  uart_id: modbus_uart
  role: server
  # flow_control_pin: GPIO21 # Uncomment and set appropriate pin if your TTL converter requires it

api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"
    password: !secret ota_password

sensor:
  - platform: wifi_signal
    name: WiFi Signal
    id: esp_wifi_signal
    icon: mdi:wifi
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: Uptime
    id: esp_uptime
    type: seconds
    icon: mdi:timer-check
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      id: esp_ip_address
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      name: WiFi SSID
      id: esp_wifi_ssid
      icon: mdi:access-point
      entity_category: diagnostic
