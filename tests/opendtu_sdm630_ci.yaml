substitutions:
  device_name: opendtu-sdm630-ci

external_components:
  - source:
      type: local
      path: ../components
    components: [opendtu_sdm630]

opendtu_sdm630:
  id: opendtu
  host: 192.168.1.50
  password: !secret opendtu_password
  modbus_id: modbus_1
  microinverter_map:
    - name: test-inverter
      grid_phase: 1

esphome:
  name: ${device_name}
  min_version: "2025.6.0"

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: INFO

uart:
  id: modbus_uart
  tx_pin: 17
  rx_pin: 16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

modbus:
  id: modbus_1
  uart_id: modbus_uart
  role: server

api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
